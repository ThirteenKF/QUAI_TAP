<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>QUAITAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="soapBackdrop" class="soap-backdrop" aria-hidden="true"></div>
    <main class="app app--fill">
      <section class="panel panel--compact" aria-label="QUAITAP">
        <header class="panel-header">
          <div class="panel-header-left">
            <a class="corner-btn corner-left" href="/leaderboard.html">Leaderboard</a>
            <a class="corner-btn corner-left" href="/earn.html">Earn</a>
          </div>
          <div class="header-wallet">
            <button id="connectBtn" class="corner-btn corner-right" type="button">
              Connect Wallet
            </button>
            <p id="walletStatus" class="wallet-status wallet-status-header">
              Wallet not connected
            </p>
            <p id="quaiPrice" class="quai-price" aria-live="polite">
              QUAI — …
            </p>
            <p id="quaiHashrate" class="quai-hashrate" aria-live="polite">
              Network hashrate — …
            </p>
          </div>
        </header>

        <div class="panel-body">
          <div class="panel-donate-wrap">
            <div class="donate-block">
              <div class="donate-row">
                <input
                  id="donateAmount"
                  class="donate-input"
                  type="text"
                  inputmode="decimal"
                  placeholder="0.0"
                  autocomplete="off"
                  aria-label="Amount in QUAI"
                />
                <span class="donate-unit">QUAI</span>
              </div>
              <button id="donateBtn" class="donate-btn" type="button" disabled>
                Donate
              </button>
              <p id="donateStatus" class="donate-status"></p>
            </div>
          </div>
          <div class="panel-body-scroll">
          <div class="panel-meta-compact">
            <h1 class="panel-title panel-title--quai-brand">
              <span class="quai-brand__quai">QUAI</span><span class="quai-brand__tap">TAP</span>
            </h1>
            <p class="subtitle">10 taps = 1 ticket. costs 10 QUAI.</p>
            <p id="ticketLine" class="ticket-line">Tickets: —</p>
            <p class="tap-launch-line tap-launch-line--quai-brand">
              <span class="quai-brand__quai">Get</span><span class="quai-brand__tap">whitelist</span>
            </p>
          </div>

          <section id="chatPanel" class="chat-panel" aria-label="On-chain chat">
            <div class="chat-panel__head">
              <h2 class="chat-panel__title">On-chain chat</h2>
              <div class="chat-panel__head-right">
                <p id="chatContractHint" class="chat-panel__hint">Contract: —</p>
                <button id="chatDeployBtn" class="chat-deploy-btn" type="button">Deploy</button>
                <button id="chatToggleBtn" class="chat-toggle-btn" type="button" aria-label="Collapse chat">▾</button>
              </div>
            </div>
            <div id="chatPanelBody" class="chat-panel__body">
              <div class="chat-tabs" role="tablist" aria-label="Chat rooms">
                <button id="chatTabFlood" class="chat-tab" type="button" data-room="flood">Offchain Flood</button>
                <button id="chatTabGlobal" class="chat-tab" type="button" data-room="global">Onchain Secret Global</button>
                <button id="chatTabRoom" class="chat-tab" type="button" data-room="room">Onchain Secret My Room</button>
                <button id="chatTabDirect" class="chat-tab" type="button" data-room="direct">Onchain Secret Direct</button>
              </div>
              <div id="chatDirectWrap" class="chat-direct" hidden>
                <input
                  id="chatDirectTo"
                  class="chat-input"
                  type="text"
                  maxlength="42"
                  placeholder="To address (0x...)"
                  autocomplete="off"
                />
              </div>
              <ul id="chatMessages" class="chat-messages" aria-live="polite"></ul>
              <p id="chatStatus" class="chat-status"></p>
              <div class="chat-compose">
                <input
                  id="chatInput"
                  class="chat-input"
                  type="text"
                  maxlength="180"
                  placeholder="Write a message..."
                  autocomplete="off"
                />
                <button id="chatSendBtn" class="chat-send-btn" type="button" disabled>
                  Send
                </button>
              </div>
            </div>
          </section>

          <div class="panel-tap-zone">
            <button
              id="tapBtn"
              class="tap-btn"
              type="button"
              aria-label="TAP"
            >
              <span id="tapBtnArtWrap" class="tap-btn__art-wrap">
                <img
                  id="tapBtnArt"
                  class="tap-btn__art"
                  src="/images/tap-style-a-icon-only.svg"
                  alt=""
                  width="200"
                  height="200"
                  decoding="async"
                  draggable="false"
                />
              </span>
              <span class="tap-btn__label" aria-hidden="true">TAP</span>
            </button>
          </div>

          <div class="panel-bottom">
            <p id="txStatus" class="tx-status"></p>
            <button
              id="deployTestBtn"
              class="deploy-test-btn"
              type="button"
              hidden
              disabled
            >
              Start game
            </button>
          </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
