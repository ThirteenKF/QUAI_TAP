<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>QUAITAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="soapBackdrop" class="soap-backdrop" aria-hidden="true"></div>
    <main class="app app--fill">
      <section class="panel panel--compact" aria-label="QUAITAP">
        <header class="panel-header">
          <div class="panel-header-left">
            <a class="corner-btn corner-left" href="/leaderboard.html">Leaderboard</a>
            <a class="corner-btn corner-left" href="/earn.html">Earn</a>
          </div>
          <div class="header-wallet">
            <button id="connectBtn" class="corner-btn corner-right" type="button">
              Wallet
            </button>
            <p id="walletStatus" class="wallet-status wallet-status-header">
              Wallet not connected
            </p>
            <p id="quaiPrice" class="quai-price" aria-live="polite">
              QUAI — …
            </p>
            <p id="quaiHashrate" class="quai-hashrate" aria-live="polite">
              Network hashrate — …
            </p>
          </div>
        </header>

        <div class="panel-body">
          <div class="panel-donate-wrap">
            <div class="donate-block">
              <div class="donate-row">
                <input
                  id="donateAmount"
                  class="donate-input"
                  type="text"
                  inputmode="decimal"
                  placeholder="0.0"
                  autocomplete="off"
                  aria-label="Amount in QUAI"
                />
                <span class="donate-unit">QUAI</span>
              </div>
              <button id="donateBtn" class="donate-btn" type="button" disabled>
                Donate
              </button>
              <p id="donateStatus" class="donate-status"></p>
            </div>
          </div>
          <nav class="quai-social" aria-label="Quai Network community and official website">
            <a
              class="quai-social__link"
              href="https://x.com/QuaiNetwork"
              target="_blank"
              rel="noopener noreferrer"
              title="Quai Network on X"
            >
              X
            </a>
            <a
              class="quai-social__link"
              href="https://discord.com/invite/quai"
              target="_blank"
              rel="noopener noreferrer"
              title="Quai Network on Discord"
            >
              Discord
            </a>
            <a
              class="quai-social__link"
              href="https://qu.ai/"
              target="_blank"
              rel="noopener noreferrer"
              title="QUAI Network — official website"
            >
              QUAI Network
            </a>
          </nav>

          <div class="panel-body-scroll">
          <div class="panel-meta-compact">
            <h1 class="panel-title panel-title--quai-brand">
              <span class="quai-brand__quai">QUAI</span><span class="quai-brand__tap">TAP</span>
            </h1>
            <p class="subtitle">10 taps = 1 ticket. costs 10 QUAI.</p>
            <p id="ticketLine" class="ticket-line">Tickets: —</p>
            <p class="tap-launch-line">
              <span class="tap-launch-line__lead">Get</span> whitelist spots for a
              <span class="tap-launch-line__accent">top NFT</span> collection launching on
              <span class="tap-launch-line__qwant">Qwant</span>.
            </p>
          </div>

          <div class="panel-tap-zone">
            <button
              id="tapBtn"
              class="tap-btn"
              type="button"
              aria-label="TAP"
            >
              <img
                id="tapBtnArt"
                class="tap-btn__art"
                src="/images/tap-style-a.svg"
                alt=""
                width="200"
                height="200"
                decoding="async"
                draggable="false"
              />
            </button>
          </div>

          <div class="panel-bottom">
            <p id="txStatus" class="tx-status"></p>
            <button
              id="deployTestBtn"
              class="deploy-test-btn"
              type="button"
              hidden
              disabled
            >
              Start game
            </button>
          </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
