<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Earn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="soapBackdrop" class="soap-backdrop" aria-hidden="true"></div>
    <main class="app app--fill">
      <section class="card" aria-label="Earn">
        <a class="corner-btn corner-left" href="/">Back</a>
        <h1>Earn</h1>
        <p class="subtitle">Spin cost: 10 tickets</p>

        <section class="earn-fruit" aria-label="Wheel game">
          <div class="wheel-stage">
            <div class="wheel-pointer" aria-hidden="true"></div>
            <canvas id="wheelCanvas" class="wheel-canvas" width="360" height="360"></canvas>
          </div>
          <div class="earn-actions">
            <button id="wheelSpinBtn" class="corner-btn corner-right wheel-spin-btn" type="button">Spin Wheel</button>
          </div>
          <p id="wheelStatus" class="earn-status">Press Spin Wheel to start.</p>
        </section>
      </section>

      <section id="chatPanel" class="chat-panel" aria-label="On-chain chat">
        <div class="chat-panel__head">
          <h2 class="chat-panel__title">On-chain chat</h2>
          <div class="chat-panel__head-right">
            <button id="chatToggleBtn" class="chat-toggle-btn" type="button" aria-label="Collapse chat">▾</button>
          </div>
        </div>
        <div id="chatPanelBody" class="chat-panel__body">
          <div class="chat-tabs">
            <button id="chatTabFlood" class="chat-tab" type="button" data-room="flood">Onchain Secret Flood</button>
            <button id="chatTabGlobal" class="chat-tab" type="button" data-room="global">Onchain Secret Global</button>
            <button id="chatTabRoom" class="chat-tab" type="button" data-room="room" disabled>Onchain Secret My Room</button>
            <button id="chatTabDirect" class="chat-tab" type="button" data-room="direct">Onchain Secret Direct</button>
          </div>
          <div id="chatDirectWrap" class="chat-direct" hidden>
            <input
              id="chatDirectTo"
              class="chat-input"
              type="text"
              maxlength="42"
              placeholder="To address (0x...)"
              autocomplete="off"
            />
          </div>
          <ul id="chatMessages" class="chat-messages" aria-live="polite"></ul>
          <p id="chatStatus" class="chat-status"></p>
          <div class="chat-compose">
            <input
              id="chatInput"
              class="chat-input"
              type="text"
              maxlength="180"
              placeholder="Message (on-chain fee applies)"
            />
            <button id="chatSendBtn" class="chat-send-btn" type="button" disabled>
              Send
            </button>
          </div>
          <p id="chatContractHint" class="chat-panel__hint"></p>
        </div>
      </section>
    </main>
    <script type="module" src="/src/earn.js"></script>
  </body>
</html>
