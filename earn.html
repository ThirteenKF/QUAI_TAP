<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Earn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="app app--fill">
      <section class="card" aria-label="Earn">
        <a class="corner-btn corner-left" href="/">Back</a>
        <h1>Earn</h1>
        <p class="subtitle">TV wheel game prototype</p>

        <section class="earn-fruit" aria-label="Wheel game">
          <div class="wheel-stage">
            <div class="wheel-pointer" aria-hidden="true"></div>
            <canvas id="wheelCanvas" class="wheel-canvas" width="360" height="360"></canvas>
          </div>
          <div class="earn-actions">
            <button id="wheelSpinBtn" class="corner-btn corner-right" type="button">Spin Wheel</button>
          </div>
          <p id="wheelStatus" class="earn-status">Press Spin Wheel to start.</p>
        </section>
      </section>
    </main>
    <script type="module" src="/src/earn.js"></script>
  </body>
</html>
